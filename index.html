<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marketplace Petani Tebu</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-green-50">

<!-- HEADER -->
<header class="bg-green-600 text-white p-5 text-center text-2xl font-bold">
Marketplace Hasil Petani Tebu
</header>


<!-- FORM INPUT DATA -->
<div class="max-w-xl mx-auto bg-white p-6 mt-8 rounded shadow">

<h2 class="text-xl font-bold mb-4 text-green-700">
Input Data Produk
</h2>

<div class="space-y-3">

<input id="id" class="w-full border p-2 rounded" placeholder="Id Produk">

<input id="produk" class="w-full border p-2 rounded" placeholder="Nama Produk">

<input id="stok" class="w-full border p-2 rounded" placeholder="Stok">

<input id="harga" class="w-full border p-2 rounded" placeholder="Harga">

<input id="petani" class="w-full border p-2 rounded" placeholder="Nama Petani">

<input id="lokasi" class="w-full border p-2 rounded" placeholder="Lokasi Petani">

<button onclick="cekForm()" 
class="bg-yellow-400 hover:bg-yellow-500 w-full p-2 rounded font-bold">
Simpan Data
</button>

</div>

</div>


<!-- TAMPIL DATA PRODUK -->
<div class="max-w-5xl mx-auto mt-10">

<h2 class="text-2xl font-bold text-center text-green-700 mb-6">
Data Produk Tebu
</h2>

<div id="produkList" class="grid grid-cols-1 md:grid-cols-3 gap-6 p-4"></div>

</div>


<!-- FOOTER -->
<footer class="text-center mt-10 p-5 text-gray-500">
Website Petani Tebu © 2026
</footer>


<script src="js/app.js"></script>

</body>
</html>
